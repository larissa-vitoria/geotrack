services:
  db:
    image: postgis/postgis:15-3.3
    container_name: geotrack_db
    environment:
      POSTGRES_DB: geotrack_db
      POSTGRES_USER: larissa
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: geotrack_backend
    command: sh -c "python manage.py migrate && python manage.py seed_fleet && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  simulador:
    build: ./backend
    container_name: geotrack_simulador
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - backend
    command: python manage.py run_simulation
    tty: true
    stdin_open: true
    restart: always

  frontend:
    build: ./frontend
    container_name: geotrack_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: